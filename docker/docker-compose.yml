version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       verdura_db
      POSTGRES_USER:     verdura
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdura -d verdura_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"        # 6380 on host to avoid conflict with your existing Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Laravel API ─────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_NAME:         "Verdura Naturals"
      APP_ENV:          production
      APP_KEY:          ${APP_KEY}
      APP_DEBUG:        false
      DB_CONNECTION:    pgsql
      DB_HOST:          db
      DB_PORT:          5432
      DB_DATABASE:      verdura_db
      DB_USERNAME:      verdura
      DB_PASSWORD:      secret
      CACHE_DRIVER:     redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER:   redis
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:3000"
    ports:
      - "8000:8000"

  # ── Next.js Frontend ────────────────────────────────────────
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:  http://localhost:8000
        NEXT_PUBLIC_SITE_URL: http://localhost
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

  # ── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    volumes:
      - ../nginx/verdura.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  pgdata:
