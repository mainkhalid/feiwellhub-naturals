version: "3.9"

services:
  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:3000"
    ports:
      - "8000:8000"

  web:
   build:
     context: ../frontend
     dockerfile: Dockerfile
     args:
       NEXT_PUBLIC_API_URL: http://api:8000
       NEXT_PUBLIC_SITE_URL: http://localhost

   environment:
     NEXT_PUBLIC_API_URL: http://api:8000
     NEXT_PUBLIC_SITE_URL: http://localhost

   restart: unless-stopped

   depends_on:
     - api

   ports:
    - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    volumes:
      - ../nginx/verdura.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
